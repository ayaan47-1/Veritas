app:
  env: dev
  cors_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    - "http://localhost:8001"

database:
  url: "postgresql+psycopg2://veritas:veritas@localhost:5432/veritas"

redis:
  url: "redis://localhost:6379/0"

storage:
  data_dir: "data"

ingest:
  max_pages: 500

chunking:
  max_chars: 4000

inngest:
  # Dev server: npx inngest-cli@latest dev -u http://localhost:8000/api/inngest
  # Self-hosted prod: docker run -p 8288:8288 inngest/inngest
  retries: 2

llm:
  primary_model: "claude-sonnet-4-6"
  fallback_models:
    - "claude-haiku-4-5-20251001"
  max_retries: 2
  retry_backoff_base: 2
  chunk_selection:
    # 0 means extract from all chunks. Set >0 to cap per extraction stage.
    max_chunks_per_stage: 10
    use_mmr: true
    mmr_lambda: 0.7

ocr:
  min_raw_text_chars: 50

scoring:
  weights:
    quote_verified: 40
    strong_modality: 15
    due_date_resolved: 10
    responsible_party_linked: 10
    doc_type_aligned: 10
    verifier_pass: 15
    statute_reference: 10
    monetary_amount: 5
    explicit_deadline: 5
    cross_obligation_linked: 5
    external_reference: 5
    obligation_statute_reference: 5
    obligation_monetary_amount: 5
  penalties:
    weak_modality: -25
    ocr_source: -15
    contradiction: -30
    missing_deadline: -10

rescoring:
  enabled: true
  model: "claude-haiku-4-5-20251001"
  max_items_per_call: 50
