version: '3.8'

services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: veritas
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: veritas
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    ports:
      - "8000:8000"
    env_file: .env.production
    environment:
      - DATABASE_URL=postgresql://veritas:${DB_PASSWORD}@postgres:5432/veritas
      - DATA_DIR=/data
    volumes:
      - file_data:/data
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://${DROPLET_IP}:8000
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  file_data:
